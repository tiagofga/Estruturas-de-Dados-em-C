name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [Lista, Fila, Árvore, Grafo]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build module
        run: make -C "${{ matrix.module }}"

      - name: Test module
        run: make -C "${{ matrix.module }}" test
