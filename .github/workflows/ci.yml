name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
    strategy:
      fail-fast: false
      matrix:
        module:
          - Lista
          - Fila
          - Pilha
          - Heap
          - Arvore
          - Grafo
          - TabelaHash
          - ListaEncadeada
          - ListaDuplamenteEncadeada
          - GrafoListaAdjacencia
          - AVL
          - AlgoritmosGrafos
          - MetodosOrdenacao
          - MetodosBusca

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build module
        run: make -C "${{ matrix.module }}"

      - name: Test module
        run: make -C "${{ matrix.module }}" test

  sanitizer:
    runs-on: ubuntu-latest
    env:
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
    strategy:
      fail-fast: false
      matrix:
        module:
          - Heap
          - TabelaHash
          - ListaEncadeada
          - ListaDuplamenteEncadeada
          - GrafoListaAdjacencia
          - AVL
          - AlgoritmosGrafos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run sanitizer tests
        run: make -C "${{ matrix.module }}" sanitize

  coverage:
    runs-on: ubuntu-latest
    env:
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate coverage report
        run: make coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  benchmark:
    runs-on: ubuntu-latest
    env:
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run benchmarks
        run: make benchmark
